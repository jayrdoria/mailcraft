<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Stakes Casino — Jackpot Club</title>
    <style type="text/css">
      body { width: 100%; margin: 0; padding: 0; background-color: #ececec; text-align: center; font-family: Roboto, sans-serif; font-size: 15px; line-height: 1.6; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; mso-margin-top-alt: 0; mso-margin-bottom-alt: 0; mso-padding-alt: 0; }
      html { width: 100%; }
      img { max-width: 100%; border: 0; outline: 0; text-decoration: none; -ms-interpolation-mode: bicubic; }
      table { border-collapse: collapse; mso-table-lspace: 0; mso-table-rspace: 0; }
      p, h1, h2, h3, h4, span { margin-top: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
      a, a:visited { color: #ef5e5e; text-decoration: none; }
      a:hover, a:active { color: #c94040; }
      @media only screen and (max-width: 620px) {
        body { width: auto !important; }
        .outer-td { padding: 0 !important; }
        .main { width: 100% !important; max-width: 100% !important; }
        .content-td { padding: 20px 20px 18px 20px !important; }
        .banner-td { padding: 0 !important; }
        .promo-td { padding: 16px 12px 20px 12px !important; }
        .promo-col-3 { display: block !important; width: 100% !important; padding: 0 0 20px 0 !important; }
        .promo-img { max-width: 70% !important; width: 70% !important; }
        .footer-icons-td { padding: 16px 20px 8px 20px !important; }
        .footer-legal-td { padding: 6px 20px 20px 20px !important; }
        .logo-td { padding: 16px 20px 10px 20px !important; }
      }
    </style>
  </head>
  <body yahoo="fix" leftmargin="0" topmargin="0" marginwidth="0" marginheight="0" style="background-color: #ececec">
    <center>
      <table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#ececec">
        <tbody>
          <tr>
            <td align="center" valign="top" class="outer-td" style="padding: 0; background-color: #ececec">
              <table width="100%" border="0" cellpadding="0" cellspacing="0" bgcolor="#000000" class="main" style="background-color: #000000; max-width: 560px">
                <tbody>

                  <!-- LOGO -->
                  <tr>
                    <td align="center" class="logo-td" style="padding: 20px 20px 12px 20px; background-color: #000000;">
                      <a href="{{LOGO_LINK}}">
                        <img src="https://scdn.ntgm.rocks/image/stakes/auto/auto/Stakes-Casino-Colored-S.png" alt="Stakes Casino" width="160" style="display: block; max-width: 160px; margin: 0 auto;" />
                      </a>
                    </td>
                  </tr>

                  <!-- BANNER -->
                  <tr>
                    <td align="center" class="banner-td" style="padding: 0; background-color: #000000">
                      <a href="{{BANNER_LINK}}">
                        <img src="{{BANNER_IMG}}" alt="Jackpot Club" width="560" style="display: block; width: 100%; max-width: 560px" />
                      </a>
                    </td>
                  </tr>

                  <!-- CONTENT -->
                  <tr>
                    <td align="center" class="content-td" style="padding: 24px 48px 20px 48px; background-color: #000000;">
                      <p style="margin: 0; font-family: Roboto, sans-serif; font-size: 22px; font-weight: 700; color: #ef5e5e; text-align: center; line-height: 1.2; padding-bottom: 14px;">
                        {{GREETING}}, {{customer.First_Name | capitalize}}!
                      </p>

                      {{BODY_CONTENT}}

                      <table border="0" cellpadding="0" cellspacing="0" align="center" style="border-radius: 6px">
                        <tbody>
                          <tr>
                            <td align="center" bgcolor="#ef5e5e" style="background-color: #ef5e5e; border-radius: 6px;">
                              <a href="{{CTA_LINK}}" style="display: inline-block; background-color: #ef5e5e; color: #ffffff; font-family: Roboto, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; padding: 11px 32px; border-radius: 6px;">{{CTA_TEXT}}</a>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </td>
                  </tr>

                  <!-- USERNAME -->
                  <tr>
                    <td align="center" style="padding: 0 48px 4px 48px; background-color: #000000;">
                      <p style="margin: 0; font-family: Roboto, sans-serif; font-size: 14px; font-weight: 400; color: #888888; text-align: center; line-height: 1.5;">
                        {{USERNAME_LABEL}}: {{customer.id}}
                      </p>
                    </td>
                  </tr>

                  <!-- SECTION:START:FORGOT_PASSWORD -->
                  <tr>
                    <td align="center" style="padding: 0 48px 12px 48px; background-color: #000000;">
                      <p style="margin: 0; font-family: Roboto, sans-serif; font-size: 14px; font-weight: 400; color: #888888; text-align: center; line-height: 1.5;">
                        {{FORGOT_LABEL}} <a href="{{FORGOT_LINK}}" target="_blank" style="color: #ef5e5e; font-weight: 700; text-decoration: underline;">{{FORGOT_CTA}}</a>
                      </p>
                    </td>
                  </tr>
                  <!-- SECTION:END:FORGOT_PASSWORD -->

                  <!-- SECTION:START:THUMBNAILS -->
                  <tr>
                    <td class="promo-td" style="padding: 12px 16px 24px 16px; background-color: #000000;">
                      <table width="100%" border="0" cellpadding="0" cellspacing="0" style="table-layout: fixed; width: 100%">
                        <tbody>
                          <tr>
                            <td align="center" valign="top" width="50%" class="promo-col-3" style="padding: 0 8px 0 0">
                              <table width="100%" border="0" cellpadding="0" cellspacing="0">
                                <tbody>
                                  <tr>
                                    <td align="center" valign="bottom" height="130" style="height: 130px">
                                      <a href="{{THUMB1_LINK}}" target="_blank" style="text-decoration: none; display: block">
                                        <img src="{{THUMB1_IMG}}" alt="{{THUMB1_LABEL}}" width="260" class="promo-img" style="display: block; width: 100%; max-width: 260px; margin: 0 auto;" />
                                      </a>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td align="center" valign="middle" height="44" style="height: 44px">
                                      <p style="margin: 0; font-family: Roboto, sans-serif; font-size: 14px; font-weight: 700; color: #ffffff; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; padding-top: 8px; word-break: break-word; overflow-wrap: break-word;">{{THUMB1_LABEL}}</p>
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </td>
                            <td align="center" valign="top" width="50%" class="promo-col-3" style="padding: 0 0 0 8px">
                              <table width="100%" border="0" cellpadding="0" cellspacing="0">
                                <tbody>
                                  <tr>
                                    <td align="center" valign="bottom" height="130" style="height: 130px">
                                      <a href="{{THUMB2_LINK}}" target="_blank" style="text-decoration: none; display: block">
                                        <img src="{{THUMB2_IMG}}" alt="{{THUMB2_LABEL}}" width="260" class="promo-img" style="display: block; width: 100%; max-width: 260px; margin: 0 auto;" />
                                      </a>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td align="center" valign="middle" height="44" style="height: 44px">
                                      <p style="margin: 0; font-family: Roboto, sans-serif; font-size: 14px; font-weight: 700; color: #ffffff; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; padding-top: 8px; word-break: break-word; overflow-wrap: break-word;">{{THUMB2_LABEL}}</p>
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </td>
                  </tr>
                  <!-- SECTION:END:THUMBNAILS -->

                  <!-- FOOTER DIVIDER -->
                  <tr>
                    <td style="padding: 0; background-color: #000000; line-height: 0; font-size: 0;">
                      <div style="height: 1px; background-color: #888888; margin: 0 36px;"></div>
                    </td>
                  </tr>

                  <!-- SECTION:START:TERMS -->
                  <tr>
                    <td style="padding: 14px 36px 14px 36px; background-color: #000000; font-family: Roboto, sans-serif; font-size: 14px; line-height: 1.6; color: #888888; text-align: justify;">
                      {{TERMS_TEXT}}
                    </td>
                  </tr>
                  <!-- SECTION:END:TERMS -->

                  <!-- TERMS DIVIDER BOTTOM -->
                  <tr>
                    <td style="padding: 0; background-color: #000000; line-height: 0; font-size: 0;">
                      <div style="height: 1px; background-color: #888888; margin: 0 36px;"></div>
                    </td>
                  </tr>

                  <!-- PAYMENT METHODS -->
                  <tr>
                    <td align="center" style="padding: 12px 36px; background-color: #000000;">
                      <img src="https://scdn.ntgm.rocks/image/stakes/auto/auto/Stakes%20Casino%20payment%20method.png" alt="Payment Methods" width="488" style="display: block; max-width: 100%;" />
                    </td>
                  </tr>

                  <!-- FOOTER LOGOS -->
                  <tr>
                    <td align="center" class="footer-icons-td" style="padding: 16px 44px 10px 44px; background-color: #000000;">
                      <a href="{{FOOTER_LOGO1_LINK}}" target="_blank" style="display: inline-block; margin-right: 16px; text-decoration: none; vertical-align: middle;">
                        <img src="https://scdn.ntgm.rocks/image/stakes/auto/auto/18%20.png" width="28" alt="18+" style="display: inline-block; vertical-align: middle" />
                      </a>
                      <a href="{{FOOTER_LOGO2_LINK}}" target="_blank" style="display: inline-block; text-decoration: none; vertical-align: middle;">
                        <img src="https://scdn.ntgm.rocks/image/stakes/auto/auto/gamcare.png" width="90" alt="GamCare" style="display: inline-block; vertical-align: middle" />
                      </a>
                    </td>
                  </tr>

                  <!-- FOOTER LEGAL -->
                  <tr>
                    <td align="center" class="footer-legal-td" style="padding: 6px 36px 22px 36px; background-color: #000000; font-family: Roboto, sans-serif; font-size: 14px; line-height: 1.7; color: #888888; text-align: center;">
                      {{FOOTER_LEGAL}}
                    </td>
                  </tr>

                </tbody>
              </table>
            </td>
          </tr>
        </tbody>
      </table>
    </center>
  </body>
</html>
