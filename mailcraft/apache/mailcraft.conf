# MailCraft — Apache reverse proxy configuration
# Add this Location block inside your existing VirtualHost for employee.netovation.eu
#
# Required modules (run once on server):
#   sudo a2enmod proxy proxy_http headers
#   sudo systemctl reload apache2

# ── Inside your existing <VirtualHost *:443> block ──────────────────────────

# Enable proxy modules
ProxyPreserveHost On
ProxyRequests Off

<Location /mailcraft>
    ProxyPass http://localhost:7070/mailcraft
    ProxyPassReverse http://localhost:7070/mailcraft

    # Forward real client IP to Next.js
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
</Location>

# ── After editing your VirtualHost, reload Apache ───────────────────────────
# sudo apache2ctl configtest
# sudo systemctl reload apache2
